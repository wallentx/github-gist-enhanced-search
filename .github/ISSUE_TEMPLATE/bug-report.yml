name: Bug report
description: Report a bug or regression in the extension.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include enough detail for us to reproduce the problem.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect to happen instead?
      placeholder: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal sequence we can follow.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Type ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser version, OS, extension version, theme, and any other relevant context.
      placeholder: Chrome 134, macOS 15, extension 0.1.0, GitHub dark dimmed
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Paste screenshots, recordings, console errors, or any other useful evidence.
      placeholder: Drag and drop screenshots or paste logs here.
    validations:
      required: false
